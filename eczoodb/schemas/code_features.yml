$schema: "http://json-schema.org/draft-06/schema"
$id: "https://errorcorrectionzoo.org/schemas/code_features"

#
# the features: code object property
#

# type: object

# # todo, we should codify the exact properties and values that can be set under
# # within the `features:` tree.

type: object
additionalProperties: false
required: []
properties:

  rate:
    type: string
    _flm: full
    _title: 'Rate'

  magic_scaling_exponent:
    type: string
    _flm: full
    _title: 'Magic'

  encoders:
    type: array
    _title: 'Encoding'
    items:
      type: string
      _flm: full

  general_gates:
    type: array
    _title: 'Gates'
    items:
      type: string
      _flm: full

  decoders:
    type: array
    _title: 'Decoding'
    items:
      type: string
      _flm: full

  transversal_gates:
    type: array
    _title: 'Transversal Gates'
    items:
      type: string
      _flm: full

  fault_tolerance:
    type: array
    _title: 'Fault Tolerance'
    items:
      type: string
      _flm: full

  threshold:
    type: array
    _title: 'Threshold'
    items:
      type: string
      _flm: full

  code_capacity_threshold:
    type: array
    _title: 'Code Capacity Threshold'
    items:
      type: string
      _flm: full


  # We can decide to add new standard feature fields here.
  #
  # ...
